version: '3.8'

services:
  mongo:
    image: mongo:8
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: task-manager-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/task-manager
      PORT: 3000
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo_data: